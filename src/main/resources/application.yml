spring:
  datasource:
    url: jdbc:h2:file:./data/pulse;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: ${PULSE_DDL_AUTO:none}
    open-in-view: false
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

logging:
  pattern:
    console: '{"ts":"%d{ISO8601}","level":"%level","logger":"%logger","requestId":"%X{requestId:-}","msg":"%message"}%n'

pulse:
  jwt:
    secret: ${JWT_SECRET:}
    ttl-ms: ${JWT_TTL_MS:3600000}
  admin:
    email: ${ADMIN_EMAIL:admin@pulse.local}
    password: ${ADMIN_PASSWORD:}
